spring:
  cloud:
    gcp:
      core:
        enabled: false # 로컬 환경 구동 시 GCP 인증 에러(ADC) 우회
      trace:
        enabled: false # 로컬 구동 시 Trace 비활성화
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    hikari:
      minimum-idle: 10
      max-lifetime: 580000 # GCP의 10분(600,000ms) Idle 연결 종료 대비
      keepalive-time: 300000 # 추가로 5분마다 커넥션 상태 확인
      connection-timeout: 3000
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog-master.yaml
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
  thymeleaf:
    enabled: false
  mail:
    host: smtp.migadu.com
    port: 465
    username: "${MAIL_USERNAME}"
    password: "${MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
jwt:
  secret-key: "${JWT_SECRET_KEY}"
cloud:
  aws:
    s3:
      bucket: "${AWS_S3_BUCKET}"
    credentials:
      access-key: "${AWS_S3_ACCESS_KEY}"
      secret-key: "${AWS_S3_SECRET_KEY}"
    region:
      static: ap-northeast-2
    stack:
      auto: false
server:
  tomcat:
    threads:
      min-spare: 10
      max: 120
    accept-count: 100
    remoteip:
      internal-proxies: ".*"
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
  servlet:
    session:
      cookie:
        same-site: none
  error:
    include-message: always
  forward-headers-strategy: native
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method
portone:
  api-key: "${PORTONE_API_KEY}"
  api-secret: "${PORTONE_API_SECRET}"
management:
  tracing:
    sampling:
      probability: 1.0 # 100% 샘플링 (디버깅 시, 이후 낮추는 것을 권장. 예: 0.1)
  health:
    defaults:
      enabled: false