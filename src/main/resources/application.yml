spring:
  cloud:
    gcp:
      core:
        enabled: true
      trace:
        enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    hikari:
      minimum-idle: 0 # Cloud Run(서버리스) 환경 방치 방지: 0으로 두어 쓰지 않는 커넥션 풀을 바로 비우도록 함 (DB쪽 무작위 킬 방지)
      idle-timeout: 60000 # 60초간 안 쓰면 Hikari가 먼저 놓아줌
      max-lifetime: 580000 # GCP의 10분(600,000ms) Idle 연결 종료 대비
      keepalive-time: 300000
      connection-timeout: 5000
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog-master.yaml
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
  thymeleaf:
    enabled: false
  mail:
    host: smtp.migadu.com
    port: 465
    username: "${MAIL_USERNAME}"
    password: "${MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
jwt:
  secret-key: "${JWT_SECRET_KEY}"
cloud:
  aws:
    s3:
      bucket: "${AWS_S3_BUCKET}"
    credentials:
      access-key: "${AWS_S3_ACCESS_KEY}"
      secret-key: "${AWS_S3_SECRET_KEY}"
    region:
      static: ap-northeast-2
    stack:
      auto: false
server:
  tomcat:
    threads:
      min-spare: 10
      max: 120
    accept-count: 100
    remoteip:
      internal-proxies: ".*"
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
  servlet:
    session:
      cookie:
        same-site: none
  error:
    include-message: always
  forward-headers-strategy: native
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method
portone:
  api-key: "${PORTONE_API_KEY}"
  api-secret: "${PORTONE_API_SECRET}"
management:
  tracing:
    enabled: true
    sampling:
      probability: 0.1 # 10% 샘플링
  health:
    defaults:
      enabled: false