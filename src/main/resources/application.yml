spring:
  cloud:
    gcp:
      core:
        enabled: true
      trace:
        enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    hikari:
      maximum-pool-size: 10 # 최대로 맺을 수 있는 커넥션 수
      minimum-idle: 0 # 고정 풀 롤백: Cloud Run 환경에서는 커넥션 유지가 오히려 '좀비 커넥션 폭탄'이 되므로 즉시 0으로 비우도록 원복
      idle-timeout: 10000 # 10초 대기 후 즉시 연결 종료 (서버리스 동결 전 최대한 빨리 깔끔하게 폐기하기 위함)
      max-lifetime: 540000 
      keepalive-time: 60000 
      connection-timeout: 1000 
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog-master.yaml
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
  thymeleaf:
    enabled: false
  mail:
    host: smtp.migadu.com
    port: 465
    username: "${MAIL_USERNAME}"
    password: "${MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
jwt:
  secret-key: "${JWT_SECRET_KEY}"
cloud:
  aws:
    s3:
      bucket: "${AWS_S3_BUCKET}"
    credentials:
      access-key: "${AWS_S3_ACCESS_KEY}"
      secret-key: "${AWS_S3_SECRET_KEY}"
    region:
      static: ap-northeast-2
    stack:
      auto: false
server:
  tomcat:
    threads:
      min-spare: 10
      max: 120
    accept-count: 100
    remoteip:
      internal-proxies: ".*"
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
  servlet:
    session:
      cookie:
        same-site: none
  error:
    include-message: always
  forward-headers-strategy: native
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method
portone:
  api-key: "${PORTONE_API_KEY}"
  api-secret: "${PORTONE_API_SECRET}"
management:
  tracing:
    enabled: true
    sampling:
      probability: 0.1 # 10% 샘플링
  health:
    defaults:
      enabled: false