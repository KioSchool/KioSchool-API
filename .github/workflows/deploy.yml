name: Deploy
on:
  push:
    # x.x.x 형태 또는 vX.X.X 형태의 태그가 푸시될 때 실행
    tags: [ "dev-*.*.*" ]

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 태그명 또는 브랜치명을 기반으로 이미지 태그 결정
      - name: Set Docker Image Tag
        id: vars
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # 태그 푸시인 경우 태그명을 그대로 사용 (예: 1.2.3)
            echo "DOCKER_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            # 브랜치 푸시인 경우 기존처럼 development 사용
            echo "DOCKER_TAG=development" >> $GITHUB_ENV
          fi

      - name: Set up JDK
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        shell: bash
        env:
          GRADLE_PROPERTIES: ${{ secrets.GRADLE_PROPERTIES }}
        run: >-
          mkdir -p ~/.gradle/
          
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          
          echo "${GRADLE_PROPERTIES}" > ~/.gradle/gradle.properties
          
          ./gradlew bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # (추가 1) ARM 아키텍처 빌드를 위한 QEMU 에뮬레이터 셋업
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. 결정된 $DOCKER_TAG를 사용하여 이미지 빌드 및 푸시
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 빌드할 플랫폼 명시 (x86 및 ARM 동시 빌드)
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kioschool-server:${{ env.DOCKER_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/kioschool-server:development

      # 3. 오라클 클라우드(Dev VM) 원격 접속 및 배포 (CD)
      - name: Deploy to Oracle Dev Server (via SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_REMOTE_IP }}
          username: ${{ secrets.DEV_REMOTE_SSH_ID }}
          key: ${{ secrets.DEV_REMOTE_SSH_KEY }}
          port: ${{ secrets.DEV_REMOTE_SSH_PORT }}
          script: |
            sudo bash update-server.sh
